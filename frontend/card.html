<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка сотрудника</title>
    
    <!-- Подключение Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/card.css">
    <link rel="stylesheet" href="css/common.css">

</head>
<body>

    <header>
        <!-- НАВИГАЦИЯ -->
        <nav class="navbar navbar-expand-lg sticky-top">
            <div class="container">
                <div class="d-flex align-items-center">
                    <img src="img/logo.png" alt="лого" style="width: 30px; height: 30px;">
                    <a class="navbar-brand ms-2" href="index.html">Staff</a>
                </div>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button> <!-- бургер для телефонов -->

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
                        <li class="nav-item"><a class="nav-link" href="catalog.html">Каталог сотрудников</a></li>
                        <li class="nav-item"><a class="nav-link" href="adminPanel.html">Админ панель</a></li>               
                    </ul>
                </div>
            </div>
        </nav>        
    </header>

    <main>
        <div class="container my-5">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card employee-card w-100">
                        <div class="card-header dark-header py-3 px-4">
                            <h5 class="mb-0 text-white">Информация о сотруднике</h5>
                        </div>

                        <div class="card-body p-4">
                            <div class="row g-4">
                                <div class="col-md-5 col-lg-4">
                                    <img src="" alt="Фото сотрудника" class="img-fluid employee-photo w-100">
                                </div>

                                <div class="col-md-7 col-lg-8">
                                    <h3 class="fw-bold mb-1 employee-name"></h3>
                                    <p class="text-muted mb-3"></p>

                                    <div class="info-box p-3 p-md-4">
                                        <div class="row g-3 mb-3">
                                            <div class="col-sm-6 d-flex align-items-start">
                                                <img src="img/gmail.png" class="info-icon mt-1 me-2" style="width: 20px; height: 20px;">
                                                <div>
                                                    <div class="info-label">EMAIL</div>
                                                    <div class="info-value"></div>
                                                </div>
                                            </div>
                                     
                                            <div class="col-sm-6 d-flex align-items-start">
                                                <img src="img/phone.png" class="info-icon mt-1 me-2" style="width: 20px; height: 20px;">
                                                <div>
                                                    <div class="info-label">ТЕЛЕФОН</div>
                                                    <div class="info-value"></div>
                                                </div>
                                            </div>
                                     
                                            <div class="col-sm-6 d-flex align-items-start">
                                                <img src="img/otdel.png" class="info-icon mt-1 me-2" style="width: 20px; height: 20px;">
                                                <div>
                                                    <div class="info-label">ОТДЕЛ</div>
                                                    <div class="info-value"></div>
                                                </div>
                                            </div>
                                         
                                            <div class="col-sm-6 d-flex align-items-start">
                                                <img src="img/calendar.png" class="info-icon mt-1 me-2" style="width: 20px; height: 20px;">
                                                <div>
                                                    <div class="info-label">ДАТА НАЙМА</div>
                                                    <div class="info-value"></div>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="d-flex align-items-start">
                                            <img src="img/bio.png" class="info-icon mt-1 me-2" style="width: 20px; height: 20px;">
                                            <div>
                                                <div class="info-label">БИОГРАФИЯ</div>
                                                <div class="info-value bio-text"></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="card-footer bg-transparent border-0 text-end pb-4 pe-4">
                            <button type="button" class="btn btn-custom-outline ms-2">
                                <a class="nav-link" href="catalog.html" style="display: inline-block; padding: 0;">Назад</a>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- ФУТЕР -->
    <footer class="text-center py-5">
        <div class="container">
            <p class="mb-0">© 2026 STAFF.<br>
            <span class="small opacity-50">Все права защищены.</span></p>
        </div>
    </footer>

    <script src="js/pages/card.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Модальное окно авторизации/регистрации -->
    <div class="modal fade" id="authModal" tabindex="-1" aria-labelledby="authModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="authModalLabel">Вход в аккаунт</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>
                <div class="modal-body">
                    <!-- Форма авторизации -->
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="loginEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="loginPassword" class="form-label">Пароль</label>
                            <input type="password" class="form-control" id="loginPassword" required>
                        </div>
                        <button type="submit" class="btn btn-dark w-100">Войти</button>
                    </form>

                    <hr class="my-4">

                    <div class="text-center">
                        <p class="mb-2">Пароль для авторизации предоставляется администратором</p>
                    </div>

                    <!-- Форма регистрации (скрыта по умолчанию) -->
                    <form id="registerForm" style="display: none;">
                        <div class="mb-3">
                            <label for="regName" class="form-label">Имя и фамилия</label>
                            <input type="text" class="form-control" id="regName" required>
                        </div>
                        <div class="mb-3">
                            <label for="regEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="regEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="regPassword" class="form-label">Пароль</label>
                            <input type="password" class="form-control" id="regPassword" required>
                        </div>
                        <div class="mb-3">
                            <label for="regConfirmPassword" class="form-label">Подтвердите пароль</label>
                            <input type="password" class="form-control" id="regConfirmPassword" required>
                        </div>
                        <button type="submit" class="btn btn-dark w-100">Зарегистрироваться</button>
                        <div class="text-center mt-3">
                            <a href="#" id="showLoginLink">← Вернуться ко входу</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="js/authGuard.js"></script>
</body>
</html>
