<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Панель администратора</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/adminPanel.css">
    <link rel="stylesheet" href="css/common.css">
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <div class="d-flex align-items-center">
                    <img src="img/logo.png" alt="лого" style="width: 30px; height: 30px;">
                    <a class="navbar-brand ms-2" href="index.html">Staff</a>
                </div>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
                        <li class="nav-item"><a class="nav-link" href="catalog.html">Каталог сотрудников</a></li>
                        <li class="nav-item"><a class="nav-link active" href="adminPanel.html">Админ панель</a></li> 
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <!-- ЗАГОЛОВОК -->
        <section class="container mt-5 mb-3">
            <div class="text-center">
                <h1 class="display-4 fw-bold mb-2">АДМИН ПАНЕЛЬ</h1>
                <p class="text-secondary">Управление каталогом сотрудников</p>
            </div>
        </section>

        <!-- СЕКЦИЯ ПОИСКА И ФИЛЬТРОВ (единый вид с catalog.html) -->
        <section class="search-section">
            <div class="container">
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label mb-1">ПОИСК</label>
                        <input type="text" id="searchInput" class="form-control" placeholder="Введите имя, фамилию или должность...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label mb-1">ОТДЕЛ</label>
                        <select id="departamentFilter" class="form-select">
                            <option value="all">Все отделы</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label mb-1">ДОЛЖНОСТЬ</label>
                        <select id="postFilter" class="form-select">
                            <option value="all">Все должности</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label mb-1">ДЕЙСТВИЯ</label>
                        <div class="d-flex gap-2">
                            <button class="btn btn-gold flex-grow-1" onclick="openControlModal()">Добавить</button>
                            <button class="btn btn-outline-dark flex-grow-1" id="exportBtn">Экспорт</button>
                            <button class="btn btn-outline-dark flex-grow-1" onclick="openAccountModal()">Аккаунты</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- СЕКЦИЯ С ТАБЛИЦЕЙ -->
        <section class="employees-section">
            <div class="container">
                <div class="admin-table-wrapper">
                    <div class="row admin-header-row d-none d-md-flex">
                        <div class="col-md-4"><h6 class="mb-0">Сотрудник</h6></div>
                        <div class="col-md-3"><h6 class="mb-0">Отдел / Должность</h6></div>
                        <div class="col-md-3"><h6 class="mb-0">Контакты</h6></div>
                        <div class="col-md-2 text-md-end"><h6 class="mb-0">Действия</h6></div>
                    </div>
                    <div id="employeesContainer"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- ФУТЕР -->
    <footer class="text-center py-5">
        <div class="container">
            <p class="mb-0">© 2026 STAFF.<br>
            <span class="small opacity-50">Все права защищены.</span></p>
        </div>
    </footer>

    <!-- Модальное окно управления -->
    <div class="modal fade" id="controlModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Управление сотрудниками</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="d-flex gap-3 mb-4 flex-wrap">
                        <button class="btn btn-action-type" onclick="showRegisterModal()">Регистрация сотрудника</button>
                        <button class="btn btn-action-type" onclick="showAddEmployeeForm()">Добавить сотрудника в каталог</button>
                        <button class="btn btn-action-type" onclick="showDepartmentPanel()">Отделы</button>
                        <button class="btn btn-action-type" onclick="showPostPanel()">Должности</button>
                    </div>
                    <div id="addEmployeePanel" style="display:none;">
                        <button class="btn btn-gold w-100" onclick="addEmptyEmployee()">Создать сотрудника</button>
                    </div>
                    <div id="departmentPanel" style="display:none;">
                        <div class="mb-3">
                            <label class="form-label">Новый отдел</label>
                            <div class="input-group">
                                <input type="text" id="newDepartmentName" class="form-control" placeholder="Название отдела">
                                <button class="btn btn-gold" onclick="addDepartment()">Добавить</button>
                            </div>
                        </div>
                        <hr>
                        <label class="form-label">Существующие отделы</label>
                        <ul id="departmentsList" class="list-group mt-2"></ul>
                    </div>
                    <div id="postPanel" style="display:none;">
                        <div class="mb-3">
                            <label class="form-label">Выберите отдел</label>
                            <select id="postDepartmentSelect" class="form-select mb-3">
                                <option value="">Выберите отдел</option>
                            </select>
                            
                            <label class="form-label">Новая должность</label>
                            <div class="input-group">
                                <input type="text" id="newPostName" class="form-control" placeholder="Название должности">
                                <button class="btn btn-gold" onclick="addPost()">Добавить</button>
                            </div>
                        </div>
                        <hr>
                        <label class="form-label">Существующие должности</label>
                        <ul id="postsList" class="list-group mt-2"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

<div class="modal fade" id="accountModal" tabindex="-1" aria-labelledby="accountModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="accountModalLabel">Создание аккаунта</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
            </div>

            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Сотрудник</label>
                    <select class="form-select" id="accountEmployeeId">
                        <option value="">Выберите сотрудника</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Логин / Email</label>
                    <input type="email" class="form-control" id="accountLogin" placeholder="user@company.ru">
                </div>

                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input type="password" class="form-control" id="accountPassword" placeholder="Введите пароль">
                </div>

                <div class="mb-3">
                    <label class="form-label">Уровень доступа</label>
                    <select class="form-select" id="accountLevel">
                        <option value="1">1 — Пользователь</option>
                        <option value="2">2 — HR</option>
                        <option value="3">3 — Администратор</option>
                    </select>
                </div>

                <button class="btn btn-gold w-100" onclick="createAccountFromAdmin()">
                    Создать аккаунт
                </button>
            </div>
        </div>
    </div>
</div>

    <!-- Модальное окно редактирования сотрудника -->
    <div class="modal fade" id="editEmployeeModal" tabindex="-1" aria-lababledby="editEmployeeModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editEmployeeModalLabel">Редактирование сотрудника</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>
                <div class="modal-body">
                    <form id="editEmployeeForm">
                        <input type="hidden" id="editEmployeeId">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Фото сотрудника</label>
                            <div class="d-flex align-items-center gap-3">
                                <img id="currentPhotoImg" src="" alt="Текущее фото" style="width: 80px; height: 80px; object-fit: cover;  display: none; border: 2px solid var(--accent-gold);">
                                <input type="file" id="editEmployeePhoto" class="form-control" accept=".png,.jpeg,.jpg,.webp" style="flex: 1;">
                            </div>
                            <div id="currentPhotoPreview" class="mt-2"></div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Фамилия</label>
                                <input type="text" id="editLastname" class="form-control" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Имя</label>
                                <input type="text" id="editFirstname" class="form-control" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Отчество</label>
                                <input type="text" id="editMiddlename" class="form-control">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Отдел</label>
                                <select id="editDepartmentId" class="form-select" required>
                                    <option value="">Выберите отдел</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Должность</label>
                                <select id="editPostId" class="form-select" required>
                                    <option value="">Выберите должность</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Телефон</label>
                                <input type="text" id="editPhone" class="form-control">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Email</label>
                                <input type="email" id="editEmail" class="form-control">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Описание (биография)</label>
                            <textarea id="editDescription" class="form-control" rows="4"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-cancel" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-save" onclick="saveEmployeeFromModal()">Сохранить</button>
                </div>
            </div>
        </div>
    </div>



    <!-- Модальное окно регистрации -->
<div class="modal fade" id="authModal" tabindex="-1" aria-labelledby="authModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="authModalLabel">Регистрация</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
            </div>
            <div class="modal-body">
                <!-- Форма регистрации -->
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="regName" class="form-label">Имя и фамилия</label>
                        <input type="text" class="form-control" id="regName" required>
                    </div>
                    <div class="mb-3">
                        <label for="regEmail" class="form-label">Email</label>
                        <input type="email" class="form-control" id="regEmail" required>
                    </div>
                    <div class="mb-3">
                        <label for="regPassword" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="regPassword" required>
                    </div>
                    <div class="mb-3">
                        <label for="regConfirmPassword" class="form-label">Подтвердите пароль</label>
                        <input type="password" class="form-control" id="regConfirmPassword" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Зарегистрироваться</button>
                </form>

                <hr class="my-4">
            </div>
        </div>
    </div>
</div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/pages/admin.js"></script>
    <script src="js/authGuard.js"></script>
</body>
</html>
