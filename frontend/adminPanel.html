<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Панель администратора</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/adminPanel.css">
    <link rel="stylesheet" href="css/common.css">
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <div class="d-flex align-items-center">
                    <img src="img/logo.png" alt="лого" style="width: 30px; height: 30px;">
                    <a class="navbar-brand ms-2" href="index.html">Staff</a>
                </div>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
                        <li class="nav-item"><a class="nav-link" href="catalog.html">Каталог сотрудников</a></li>
                        <li class="nav-item"><a class="nav-link active" href="adminPanel.html">Админ панель</a></li> 
                        <li class="nav-item"><a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#authModal">Зарегистрироваться</a></li>               
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <!-- ЗАГОЛОВОК -->
        <section class="container mt-5 mb-3">
            <div class="text-center">
                <h1 class="display-4 fw-bold mb-2">АДМИН ПАНЕЛЬ</h1>
                <p class="text-secondary">Управление каталогом сотрудников</p>
            </div>
        </section>

        <!-- СЕКЦИЯ ПОИСКА И ФИЛЬТРОВ (единый вид с catalog.html) -->
        <section class="search-section">
            <div class="container">
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label mb-1">ПОИСК</label>
                        <input type="text" id="searchInput" class="form-control" placeholder="Введите имя, фамилию или должность...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label mb-1">ОТДЕЛ</label>
                        <select id="departmentFilter" class="form-select">
                            <option value="all">Все отделы</option>
                            <option value="Управление">Управление</option>
                            <option value="Маркетинг">Маркетинг</option>
                            <option value="Административный отдел">Административный отдел</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label mb-1">ДОЛЖНОСТЬ</label>
                        <select id="positionFilter" class="form-select">
                            <option value="all">Все должности</option>
                            <option value="Руководитель">Руководитель</option>
                            <option value="Менеджер">Менеджер</option>
                            <option value="Специалист">Специалист</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label mb-1">ДЕЙСТВИЯ</label>
                        <div class="d-flex gap-2">
                            <button class="btn btn-gold flex-grow-1" onclick="openControlModal()">Добавить</button>
                            <button class="btn btn-outline-dark flex-grow-1" id="exportBtn">Экспорт</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- СЕКЦИЯ С ТАБЛИЦЕЙ -->
        <section class="employees-section">
            <div class="container">
                <div class="admin-table-wrapper">
                    <div class="row admin-header-row d-none d-md-flex">
                        <div class="col-md-4"><h6 class="mb-0">Сотрудник</h6></div>
                        <div class="col-md-3"><h6 class="mb-0">Отдел / Должность</h6></div>
                        <div class="col-md-3"><h6 class="mb-0">Контакты</h6></div>
                        <div class="col-md-2 text-md-end"><h6 class="mb-0">Действия</h6></div>
                    </div>
                    <div id="employeesContainer"></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="text-center py-4">
        <div class="container">
            <p class="mb-0">2026 STAFF. Все права защищены.</p>
        </div>
    </footer>

    <!-- Модальное окно управления -->
    <div class="modal fade" id="controlModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Управление сотрудниками</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="d-flex gap-3 mb-4 flex-wrap">
                        <button class="btn btn-action-type" onclick="showAddEmployeeForm()">Новый сотрудник</button>
                        <button class="btn btn-action-type" onclick="showDepartmentPanel()">Отделы</button>
                        <button class="btn btn-action-type" onclick="showPostPanel()">Должности</button>
                    </div>
                    <div id="addEmployeePanel" style="display:none;">
                        <div class="alert alert-info">Заполните данные нового сотрудника</div>
                        <button class="btn btn-gold w-100" onclick="addEmptyEmployee()">Создать сотрудника</button>
                    </div>
                    <div id="departmentPanel" style="display:none;">
                        <div class="mb-3">
                            <label class="form-label">Новый отдел</label>
                            <div class="input-group">
                                <input type="text" id="newDepartmentName" class="form-control" placeholder="Название отдела">
                                <button class="btn btn-gold" onclick="addDepartment()">Добавить</button>
                            </div>
                        </div>
                        <hr>
                        <label class="form-label">Существующие отделы</label>
                        <ul id="departmentsList" class="list-group mt-2"></ul>
                    </div>
                    <div id="postPanel" style="display:none;">
                        <div class="mb-3">
                            <label class="form-label">Новая должность</label>
                            <div class="input-group">
                                <input type="text" id="newPostName" class="form-control" placeholder="Название должности">
                                <button class="btn btn-gold" onclick="addPost()">Добавить</button>
                            </div>
                        </div>
                        <hr>
                        <label class="form-label">Существующие должности</label>
                        <ul id="postsList" class="list-group mt-2"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/pages/admin.js"></script>
</body>
</html>
