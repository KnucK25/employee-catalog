<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>

    <link rel="icon" href="img/logo.png" sizes="32x32" type="image/png">
    <!-- Подключение Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/card.css">
    <link rel="stylesheet" href="css/common.css">


</head>
<body>

    <header>
        <!-- НАВИГАЦИЯ -->
        <nav class="navbar navbar-expand-lg sticky-top">
            <div class="container">
                <div class="d-flex align-items-center">
                    <img src="img/logo.png" alt="лого" style="width: 30px; height: 30px;">
                    <a class="navbar-brand ms-2" href="index.html">Staff</a>
                </div>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                   <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
                        <li class="nav-item"><a class="nav-link" href="catalog.html">Каталог сотрудников</a></li>
                        <li class="nav-item"><a class="nav-link" href="adminPanel.html">Админ панель</a></li> 
                        <li class="nav-item"><a class="nav-link active" href="profile.html">Профиль</a></li>

                    </ul>
                </div>
            </div>
        </nav>        
    </header>

    <main>
        <div class="container my-5">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="employee-card">
                        <div class="card-header dark-header">
                            <h5>Личный кабинет</h5>
                        </div>

                        <div class="card-body text-center p-4">
                            <!-- Фото пользователя -->
                            <img src="img/user-placeholder.png" alt="Фото профиля" class="employee-photo rounded-circle mx-auto d-block mb-3" style="width: 150px; height: 150px;">

                            <!-- Секция для просмотра данных -->
                            <div id="view-profile">
                                <h3 class="employee-name mt-3">Загрузка...</h3>
                                <p class="text-uppercase">Загрузка...</p>

                                <div class="info-box mt-4 text-start">
                                    <div class="mb-3">
                                        <div class="info-label">Email</div>
                                        <div class="info-value" id="user-email">Загрузка...</div>
                                    </div>
                                    <div class="mb-3">
                                        <div class="info-label">Телефон</div>
                                        <div class="info-value" id="user-phone">Загрузка...</div>
                                    </div>
                                    <div class="mb-3">
                                        <div class="info-label">Отдел</div>
                                        <div class="info-value" id="user-department">Загрузка...</div>
                                    </div>
                                    <div class="mb-3">
                                        <div class="info-label">Дата регистрации</div>
                                        <div class="info-value" id="user-registration-date">Загрузка...</div>
                                    </div>
                                </div>

                                <div class="bio-text text-start mt-4">
                                    <h6 class="text-uppercase mb-2">О себе</h6>
                                    <p id="user-bio">Загрузка...</p>
                                </div>
                            </div>

                            <!-- Секция для редактирования (скрыта по умолчанию) -->
                            <div id="edit-profile" class="d-none">
                                <!-- Имя и должность НЕ РЕДАКТИРУЮТСЯ - только для отображения -->
                                <h3 class="employee-name mt-3" id="edit-name-display">Загрузка...</h3>
                                <p class="text-uppercase" id="edit-role-display">Загрузка...</p>

                                <div class="info-box mt-4 text-start">
                                    <!-- ТОЛЬКО EMAIL, ТЕЛЕФОН И ПАРОЛЬ -->
                                    <div class="mb-3">
                                        <label for="edit-email" class="form-label info-label">Email</label>
                                        <input type="email" class="form-control" id="edit-email">
                                    </div>
                                    <div class="mb-3">
                                        <label for="edit-phone" class="form-label info-label">Телефон</label>
                                        <input type="tel" class="form-control" id="edit-phone">
                                    </div>
                                    <div class="mb-3">
                                        <label for="edit-password" class="form-label info-label">Новый пароль (оставьте пустым, чтобы не менять)</label>
                                        <input type="password" class="form-control" id="edit-password" placeholder="Введите новый пароль">
                                    </div>
                                    <div class="mb-3">
                                        <label for="edit-confirm-password" class="form-label info-label">Подтверждение пароля</label>
                                        <input type="password" class="form-control" id="edit-confirm-password" placeholder="Подтвердите новый пароль">
                                    </div>
                                </div>

                                <div class="d-flex justify-content-center gap-2 mt-4">
                                    <button class="btn btn-custom-outline" id="save-profile-btn">Сохранить</button>
                                    <button class="btn btn-custom-outline" id="cancel-edit-btn">Отменить</button>
                                </div>
                            </div>

                            <!-- Кнопка редактировать -->
                            <div class="text-center mt-4" id="edit-button-container">
                                <button class="btn btn-custom-outline" id="edit-profile-btn">Редактировать</button>
                            </div>
                        </div>

                        <div class="card-footer text-center">
                            <!-- Футер -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-5">
        <div class="container">
            <p class="mb-0">© 2026 STAFF.<br>
            <span class="small opacity-50">Все права защищены.</span></p>
        </div>
    </footer>

    <script src="js/pages/profile.js"></script> 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/navigation.js"></script>
</body>
</html>
