<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог сотрудников</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/catalog.css">
    <link rel="stylesheet" href="css/common.css"> 
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <div class="d-flex align-items-center">
                    <img src="img/logo.png" alt="лого" style="width: 30px; height: 30px;">
                    <a class="navbar-brand ms-2" href="index.html">Staff</a>
                </div>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
                        <li class="nav-item"><a class="nav-link active" href="catalog.html">Каталог сотрудников</a></li>
                        <li class="nav-item"><a class="nav-link" href="adminPanel.html">Админ панель</a></li>  
                        <li class="nav-item"><a class="nav-link" href="profile.html">Личный кабинет</a></li>

                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <!-- ЗАГОЛОВОК -->
        <section class="container mt-5 mb-3">
            <div class="text-center">
                <h1 class="display-4 fw-bold mb-2">КАТАЛОГ СОТРУДНИКОВ</h1>
                <p class="text-secondary">Актуальная информация о персонале компании</p>
            </div>
        </section>

        <!-- СЕКЦИЯ ПОИСКА И ФИЛЬТРОВ -->
        <section class="search-section">
            <div class="container">
                <div class="row g-3 align-items-end">
                    <div class="col-md-5">
                        <label class="form-label mb-1">ПОИСК</label>
                        <input type="text" id="searchInput" class="form-control" placeholder="Введите имя, фамилию или должность...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label mb-1">ОТДЕЛ</label>
                        <select id="departamentFilter" class="form-select">
                            <option value="all">Все отделы</option>
                            <option value="Управление">Управление</option>
                            <option value="Маркетинг">Маркетинг</option>
                            <option value="Административный отдел">Административный отдел</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label mb-1">ДОЛЖНОСТЬ</label>
                        <select id="postFilter" class="form-select">
                            <option value="all">Все должности</option>
                            <option value="Руководитель">Руководитель</option>
                            <option value="Менеджер">Менеджер</option>
                            <option value="Специалист">Специалист</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

        <!-- СЕКЦИЯ С КАРТОЧКАМИ -->
        <section class="employees-section">
            <div class="container">
                <div class="row g-4" id="catalogContainer">
                    <div class="col-12 text-center text-muted py-5">
                        Загрузка сотрудников...
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- ФУТЕР -->
    <footer class="text-center py-5">
        <div class="container">
            <p class="mb-0">© 2026 STAFF.<br>
            <span class="small opacity-50">Все права защищены.</span></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/pages/catalog.js"></script>
    <script src="js/authGuard.js"></script>
</html>
